<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrikLab | Bilik Bazası</title>
    <link id="favicon" rel="icon" href="https://i.postimg.cc/8zXzM9m9/robot-head.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #3b82f6; --bg-main: #0a0f1a; --card-bg: rgba(17, 25, 40, 0.75); }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: #f1f5f9; overflow-x: hidden; }
        .font-os { font-family: 'Orbitron', sans-serif; }
        .hero-mesh { background: radial-gradient(circle at 50% -10%, rgba(59, 130, 246, 0.15) 0%, transparent 50%), var(--bg-main); }
        
        .glass-box { 
            background: var(--card-bg); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            transition: all 0.4s ease;
        }
        .glass-box:hover { 
            border-color: var(--neon-blue); 
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        .icon-grad { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .lang-active { border: 1px solid var(--neon-blue); opacity: 1; filter: drop-shadow(0 0 8px var(--neon-blue)); }
    </style>
</head>
<body class="hero-mesh min-h-screen">

    <nav class="fixed w-full z-50 border-b border-white/5 bg-slate-950/60 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-os text-white font-bold">O</div>
                <span class="text-xl font-os font-bold tracking-widest text-white">ORIK<span class="text-blue-500">LAB</span></span>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-white/5 px-2 py-1 rounded-lg border border-white/10">
                    <img src="https://flagcdn.com/w40/az.png" id="flag-az" onclick="switchLang('az')" class="w-6 opacity-40 cursor-pointer hover:opacity-100 transition" alt="AZ">
                    <img src="https://flagcdn.com/w40/de.png" id="flag-de" onclick="switchLang('de')" class="w-6 opacity-40 cursor-pointer hover:opacity-100 transition" alt="DE">
                </div>
                <a href="index.html" class="text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-white transition">
                    <i class="fa-solid fa-chevron-left mr-2"></i> <span id="nav-back">Geri</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="pt-48 pb-20 px-6">
        <div class="max-w-7xl mx-auto text-center">
            <h1 id="main-title" class="text-5xl md:text-7xl font-os font-bold text-white mb-6 tracking-tighter uppercase italic">
                BİLİK <span class="text-blue-600">BAZASI</span>
            </h1>
            <p id="main-desc" class="max-w-3xl mx-auto text-gray-400 text-lg md:text-xl font-light leading-relaxed mb-16 italic">
                İntellektual yüksəliş üçün universal resurs mərkəzi: Təcrübə, innovasiya və rəqəmsal biliklərin vahid arxivi.
            </p>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                
                <div class="glass-box p-8 rounded-[2.5rem] flex flex-col items-center group cursor-pointer">
                    <div class="w-16 h-16 icon-grad rounded-2xl flex items-center justify-center text-2xl text-white mb-6 group-hover:rotate-12 transition">
                        <i class="fa-solid fa-graduation-cap"></i>
                    </div>
                    <h3 id="card1-t" class="text-lg font-os font-bold text-white mb-2 uppercase tracking-tight">DƏRSLİKLƏR</h3>
                    <p id="card1-d" class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Master-klass və kurslar</p>
                </div>

                <div class="glass-box p-8 rounded-[2.5rem] flex flex-col items-center group cursor-pointer border-blue-500/10">
                    <div class="w-16 h-16 icon-grad rounded-2xl flex items-center justify-center text-2xl text-white mb-6 group-hover:scale-110 transition">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <h3 id="card2-t" class="text-lg font-os font-bold text-white mb-2 uppercase tracking-tight">AI LAB</h3>
                    <p id="card2-d" class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Süni İntellekt həlləri</p>
                </div>

                <div class="glass-box p-8 rounded-[2.5rem] flex flex-col items-center group cursor-pointer border-blue-500/20 shadow-lg">
                    <div class="w-16 h-16 icon-grad rounded-2xl flex items-center justify-center text-2xl text-white mb-6 group-hover:rotate-12 transition">
                        <i class="fa-solid fa-screwdriver-wrench"></i>
                    </div>
                    <h3 id="card3-t" class="text-lg font-os font-bold text-white mb-2 uppercase tracking-tight">ALƏTLƏR</h3>
                    <p id="card3-d" class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Faydalı resurslar</p>
                </div>

                <div class="glass-box p-8 rounded-[2.5rem] flex flex-col items-center group cursor-pointer">
                    <div class="w-16 h-16 icon-grad rounded-2xl flex items-center justify-center text-2xl text-white mb-6 group-hover:rotate-12 transition">
                        <i class="fa-solid fa-diagram-project"></i>
                    </div>
                    <h3 id="card4-t" class="text-lg font-os font-bold text-white mb-2 uppercase tracking-tight">LAYİHƏLƏR</h3>
                    <p id="card4-d" class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Case studies & Portfolio</p>
                </div>

            </div>
        </div>
    </main>

    <script>
        const translations = {
            az: {
                back: "Geri",
                title: "BİLİK BAZASI",
                desc: "İntellektual yüksəliş üçün universal resurs mərkəzi: Təcrübə, innovasiya və rəqəmsal biliklərin vahid arxivi.",
                c1T: "DƏRSLİKLƏR", c1D: "Master-klass və kurslar",
                c2T: "AI LAB", c2D: "Süni İntellekt həlləri",
                c3T: "ALƏTLƏR", c3D: "Faydalı resurslar",
                c4T: "LAYİHƏLƏR", c4D: "Case studies & Portfolio"
            },
            de: {
                back: "Zurück",
                title: "WISSENSBASIS",
                desc: "Universelles Ressourcenzentrum für intellektuelles Wachstum: Ein einheitliches Archiv für Erfahrung, Innovation und digitales Wissen.",
                c1T: "TUTORIALS", c1D: "Masterclasses & Kurse",
                c2T: "AI LAB", c2D: "KI-Lösungen & Automation",
                c3T: "TOOLS", c3D: "Nützliche Ressourcen",
                c4T: "PROJEKTE", c4D: "Case Studies & Portfolio"
            }
        };

        function switchLang(lang) {
            localStorage.setItem('selectedLang', lang);
            const t = translations[lang];
            document.getElementById('nav-back').innerText = t.back;
            document.getElementById('main-title').innerHTML = lang === 'az' ? `BİLİK <span class="text-blue-600">BAZASI</span>` : `WISSENS<span class="text-blue-600">BASIS</span>`;
            document.getElementById('main-desc').innerText = t.desc;
            document.getElementById('card1-t').innerText = t.c1T;
            document.getElementById('card1-d').innerText = t.c1D;
            document.getElementById('card2-t').innerText = t.c2T;
            document.getElementById('card2-d').innerText = t.c2D;
            document.getElementById('card3-t').innerText = t.c3T;
            document.getElementById('card3-d').innerText = t.c3D;
            document.getElementById('card4-t').innerText = t.c4T;
            document.getElementById('card4-d').innerText = t.c4D;

            document.querySelectorAll('img[id^="flag-"]').forEach(img => img.classList.remove('lang-active'));
            document.getElementById('flag-' + lang).classList.add('lang-active');
        }

        window.onload = () => { switchLang(localStorage.getItem('selectedLang') || 'az'); };
    </script>
</body>
</html>
