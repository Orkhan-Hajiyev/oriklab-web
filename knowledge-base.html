<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilik Bazası | OrikLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; }
        .font-os { font-family: 'Orbitron', sans-serif; }
        .kb-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .kb-card:hover {
            border-color: #3b82f6;
            transform: scale(1.05);
            background: rgba(30, 41, 59, 0.6);
            box-shadow: 0 20px 50px -20px rgba(59, 130, 246, 0.5);
        }
        .lang-flag { cursor: pointer; transition: 0.3s; width: 28px; opacity: 0.5; }
        .lang-active { opacity: 1; filter: drop-shadow(0 0 5px #3b82f6); transform: scale(1.1); }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_bottom_left,rgba(59,130,246,0.1),transparent)]">

    <nav class="border-b border-white/5 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="index.html" class="text-blue-500 font-os font-bold flex items-center gap-2">
                <i class="fa-solid fa-brain"></i> <span class="tracking-widest uppercase">OrikLab</span>
            </a>
            <div class="flex items-center gap-4">
                <div class="flex gap-2 bg-white/5 p-1.5 rounded-lg border border-white/10">
                    <img src="https://flagcdn.com/w40/az.png" id="flag-az" onclick="switchLang('az')" class="lang-flag">
                    <img src="https://flagcdn.com/w40/de.png" id="flag-de" onclick="switchLang('de')" class="lang-flag">
                </div>
            </div>
        </div>
    </nav>

    <header class="py-16 px-6 text-center">
        <h1 id="txt-title" class="text-4xl md:text-5xl font-os font-bold mb-4 uppercase tracking-tighter italic">
            BİLİK <span class="text-blue-500">BAZASI</span>
        </h1>
        <p id="txt-subtitle" class="text-gray-400 max-w-2xl mx-auto italic font-light">Mühəndislər üçün vahid texniki resurs və sənədləşmə mərkəzi.</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-24">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <a href="wiki.html" class="kb-card p-8 rounded-[2.5rem] flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-blue-500/10 text-blue-500 rounded-2xl flex items-center justify-center text-2xl mb-6">
                    <i class="fa-solid fa-book"></i>
                </div>
                <h3 id="t-wiki" class="font-os text-sm font-bold mb-2 uppercase">WIKI</h3>
                <p id="d-wiki" class="text-[10px] text-gray-500 italic uppercase tracking-wider">Texniki Sənədlər</p>
            </a>

            <a href="tutorials.html" class="kb-card p-8 rounded-[2.5rem] flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-2xl flex items-center justify-center text-2xl mb-6">
                    <i class="fa-solid fa-play"></i>
                </div>
                <h3 id="t-video" class="font-os text-sm font-bold mb-2 uppercase">Video Arxiv</h3>
                <p id="d-video" class="text-[10px] text-gray-500 italic uppercase tracking-wider">Mini Təlimlər</p>
            </a>

            <a href="cheatsheets.html" class="kb-card p-8 rounded-[2.5rem] flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-emerald-500/10 text-emerald-500 rounded-2xl flex items-center justify-center text-2xl mb-6">
                    <i class="fa-solid fa-file-invoice"></i>
                </div>
                <h3 id="t-cheat" class="font-os text-sm font-bold mb-2 uppercase">Cheat Sheets</h3>
                <p id="d-cheat" class="text-[10px] text-gray-500 italic uppercase tracking-wider">Yaddaş Vərəqləri</p>
            </a>

            <a href="roadmaps.html" class="kb-card p-8 rounded-[2.5rem] flex flex-col items-center text-center border-amber-500/10">
                <div class="w-16 h-16 bg-amber-500/10 text-amber-500 rounded-2xl flex items-center justify-center text-2xl mb-6">
                    <i class="fa-solid fa-map-location-dot"></i>
                </div>
                <h3 id="t-road" class="font-os text-sm font-bold mb-2 uppercase">Roadmaps</h3>
                <p id="d-road" class="text-[10px] text-gray-500 italic uppercase tracking-wider">İnkişaf Xəritələri</p>
            </a>

        </div>
    </main>

    <script>
        const translations = {
            az: {
                title: 'BİLİK <span class="text-blue-500">BAZASI</span>',
                subtitle: 'Mühəndislər üçün vahid texniki resurs və sənədləşmə mərkəzi.',
                wiki: "WIKI", dWiki: "Texniki Sənədlər",
                video: "Video Arxiv", dVideo: "Mini Təlimlər",
                cheat: "Cheat Sheets", dCheat: "Yaddaş Vərəqləri",
                road: "Roadmaps", dRoad: "İnkişaf Xəritələri"
            },
            de: {
                title: 'WISSENS<span class="text-blue-500">DATENBANK</span>',
                subtitle: 'Zentrales technisches Ressourcen- und Dokumentationszentrum für Ingenieure.',
                wiki: "WIKI", dWiki: "Dokumentation",
                video: "Video-Archiv", dVideo: "Kurzanleitungen",
                cheat: "Spickzettel", dCheat: "Referenzblätter",
                road: "Roadmaps", dRoad: "Lernpfade"
            }
        };

        function switchLang(lang) {
            localStorage.setItem('selectedLang', lang);
            const t = translations[lang];
            document.getElementById('txt-title').innerHTML = t.title;
            document.getElementById('txt-subtitle').innerText = t.subtitle;
            document.getElementById('t-wiki').innerText = t.wiki;
            document.getElementById('d-wiki').innerText = t.dWiki;
            document.getElementById('t-video').innerText = t.video;
            document.getElementById('d-video').innerText = t.dVideo;
            document.getElementById('t-cheat').innerText = t.cheat;
            document.getElementById('d-cheat').innerText = t.dCheat;
            document.getElementById('t-road').innerText = t.road;
            document.getElementById('d-road').innerText = t.dRoad;

            document.querySelectorAll('.lang-flag').forEach(img => img.classList.remove('lang-active'));
            document.getElementById('flag-' + lang).classList.add('lang-active');
        }

        window.onload = () => {
            const saved = localStorage.getItem('selectedLang') || 'az';
            switchLang(saved);
        };
    </script>
</body>
</html>
