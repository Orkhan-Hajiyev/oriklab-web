<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mövzu Təfərrüatı | OrikLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; }
        .font-os { font-family: 'Orbitron', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); }
        .reply-card { background: rgba(30, 41, 59, 0.3); border-left: 3px solid #3b82f6; }
        .admin-del { opacity: 0; transition: 0.3s; }
        .reply-card:hover .admin-del { opacity: 1; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="border-b border-white/5 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 h-16 flex items-center">
            <a href="q-a.html" class="text-blue-500 font-os font-bold text-xs flex items-center gap-2">
                <i class="fa-solid fa-chevron-left"></i> <span id="btn-back">GERİ</span>
            </a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 py-12">
        <div id="topic-content" class="mb-12">
            </div>

        <div class="space-y-8">
            <h3 class="font-os text-xs font-bold tracking-[0.3em] text-gray-500 uppercase italic">
                <span id="txt-replies">Cavablar</span>
            </h3>
            
            <div id="replies-list" class="space-y-4">
                </div>

            <hr class="border-white/5 my-10">

            <div class="glass-card p-8 rounded-[2.5rem]">
                <h4 id="txt-your-reply" class="text-blue-500 font-os text-[10px] font-bold mb-6 uppercase tracking-widest text-center">Fikrinizi Paylaşın</h4>
                <form id="reply-form" class="space-y-4">
                    <input type="text" id="r-author" placeholder="Adınız / Name (və ya Anonim)" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-blue-500 text-white">
                    <textarea id="r-body" rows="4" placeholder="Cavabınızı bura yazın..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-blue-500 text-white" required></textarea>
                    <button type="submit" id="btn-send" class="w-full bg-blue-600 py-4 rounded-2xl font-bold uppercase text-[10px] tracking-[0.3em] hover:bg-blue-500 transition shadow-lg shadow-blue-600/20">GÖNDƏR</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const topicId = urlParams.get('id');
        const lang = localStorage.getItem('selectedLang') || 'az';

        const ui = {
            az: { back: "GERİ", replies: "Cavablar", your: "Fikrinizi Paylaşın", send: "GÖNDƏR", anon: "Anonim", ph: "Cavabınızı bura yazın...", del: "Silmək üçün admin şifrəsi:" },
            de: { back: "ZURÜCK", replies: "Antworten", your: "Teilen Sie Ihre Meinung", send: "SENDEN", anon: "Anonym", ph: "Schreiben Sie hier...", del: "Admin-Passwort zum Löschen:" }
        };

        function loadTopic() {
            const topics = JSON.parse(localStorage.getItem('oriklab_topics')) || [];
            const topic = topics.find(t => t.id == topicId);

            if (!topic) {
                window.location.href = 'q-a.html';
                return;
            }

            // Sualın özünü göstərək
            document.getElementById('topic-content').innerHTML = `
                <div class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-4 italic">
                    # ${topic.category}
                </div>
                <h1 class="text-4xl font-os font-bold text-white mb-6 leading-tight">${topic.title}</h1>
                <p class="text-gray-400 text-lg leading-relaxed mb-8">${topic.body}</p>
                <div class="flex items-center gap-2 text-[10px] text-gray-600 font-bold uppercase italic">
                    <i class="fa-solid fa-user-ninja"></i> @${topic.author} — ${topic.date}
                </div>
            `;

            // Tərcümələr
            document.getElementById('btn-back').innerText = ui[lang].back;
            document.getElementById('txt-replies').innerText = ui[lang].replies;
            document.getElementById('txt-your-reply').innerText = ui[lang].your;
            document.getElementById('btn-send').innerText = ui[lang].send;
            document.getElementById('r-body').placeholder = ui[lang].ph;

            renderReplies();
        }

        function renderReplies() {
            const allReplies = JSON.parse(localStorage.getItem('oriklab_replies')) || [];
            const filtered = allReplies.filter(r => r.topicId == topicId);
            const list = document.getElementById('replies-list');
            
            list.innerHTML = filtered.length ? '' : `<p class="text-gray-600 text-sm italic">Hələ cavab yazılmayıb...</p>`;

            filtered.forEach((r, index) => {
                list.innerHTML += `
                    <div class="reply-card p-6 rounded-[1.5rem] relative group">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-blue-400 font-bold text-[11px] uppercase tracking-tighter">@${r.author}</span>
                            <div class="flex items-center gap-3">
                                <span class="text-[9px] text-gray-600 font-bold">${r.date}</span>
                                <button onclick="deleteReply(${r.id})" class="admin-del text-red-500/50 hover:text-red-500 text-[10px]">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        <p class="text-gray-300 text-sm leading-relaxed">${r.body}</p>
                    </div>
                `;
            });
        }

        // CAVAB SİLMƏ (Admin üçün)
        function deleteReply(replyId) {
            const pass = prompt(ui[lang].del);
            if (pass === "orikadmin2026") {
                let allReplies = JSON.parse(localStorage.getItem('oriklab_replies')) || [];
                allReplies = allReplies.filter(r => r.id !== replyId);
                localStorage.setItem('oriklab_replies', JSON.stringify(allReplies));
                renderReplies();
            } else if (pass !== null) {
                alert("Wrong Password!");
            }
        }

        document.getElementById('reply-form').onsubmit = function(e) {
            e.preventDefault();
            const replies = JSON.parse(localStorage.getItem('oriklab_replies')) || [];
            
            const newReply = {
                id: Date.now(),
                topicId: topicId,
                author: document.getElementById('r-author').value || ui[lang].anon,
                body: document.getElementById('r-body').value,
                date: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            replies.push(newReply);
            localStorage.setItem('oriklab_replies', JSON.stringify(replies));
            
            this.reset();
            renderReplies();
        };

        window.onload = loadTopic;
    </script>
</body>
</html>
