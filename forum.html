<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrikLab Community | Forum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; }
        .font-os { font-family: 'Orbitron', sans-serif; }
        .forum-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            transition: all 0.3s ease; 
        }
        .forum-card:hover { 
            border-color: #3b82f6; 
            transform: translateY(-2px);
            background: rgba(30, 41, 59, 0.5);
        }
        .hero-mesh { background-image: radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.2) 0, transparent 50%); }
        .lang-flag { cursor: pointer; opacity: 0.5; transition: 0.3s; width: 25px; }
        .lang-active { opacity: 1; filter: drop-shadow(0 0 5px #3b82f6); }
    </style>
</head>
<body class="hero-mesh min-h-screen">

    <nav class="border-b border-white/5 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="index.html" id="back-link" class="text-blue-500 font-os font-bold flex items-center gap-2 hover:text-blue-400 transition">
                <i class="fa-solid fa-arrow-left text-sm"></i> <span id="txt-nav-back">ANA SƏHİFƏ</span>
            </a>
            <div class="font-os text-lg font-bold tracking-tighter text-white">
                ORIK<span class="text-blue-600">LAB</span> <span class="text-gray-500 text-xs italic ml-2">COMMUNITY</span>
            </div>
            <div class="flex items-center gap-3 bg-white/5 px-3 py-1 rounded-xl">
                <img src="https://flagcdn.com/w40/az.png" id="f-az" onclick="setLang('az')" class="lang-flag lang-active" alt="AZ">
                <img src="https://flagcdn.com/w40/de.png" id="f-de" onclick="setLang('de')" class="lang-flag" alt="DE">
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        <header class="mb-12">
            <h1 id="txt-forum-title" class="text-4xl font-os font-bold mb-3 italic">İCMA <span class="text-blue-600">PANELİ</span></h1>
            <p id="txt-forum-subtitle" class="text-gray-500 text-sm uppercase tracking-widest font-semibold">Müzakirələr, Layihələr və İdeyalar</p>
        </header>

        <div class="grid gap-6">
            <div class="forum-card p-6 rounded-3xl flex items-center justify-between group">
                <div class="flex items-center gap-6">
                    <div class="w-14 h-14 bg-amber-500/10 text-amber-500 rounded-2xl flex items-center justify-center text-2xl border border-amber-500/20">
                        <i class="fa-solid fa-lightbulb"></i>
                    </div>
                    <div>
                        <h3 id="cat-1-t" class="font-os font-bold text-xl group-hover:text-blue-400">İdeya Bankı</h3>
                        <p id="cat-1-d" class="text-gray-400 text-sm mt-1">Yeni startap və texnoloji ideyaların müzakirəsi.</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-700 group-hover:text-blue-500 pr-4"></i>
            </div>

            <div class="forum-card p-6 rounded-3xl flex items-center justify-between group">
                <div class="flex items-center gap-6">
                    <div class="w-14 h-14 bg-blue-500/10 text-blue-500 rounded-2xl flex items-center justify-center text-2xl border border-blue-500/20">
                        <i class="fa-solid fa-diagram-project"></i>
                    </div>
                    <div>
                        <h3 id="cat-2-t" class="font-os font-bold text-xl group-hover:text-blue-400">Aktiv Layihələr</h3>
                        <p id="cat-2-d" class="text-gray-400 text-sm mt-1">OrikOS üzərində qurulan yeni tətbiqlər.</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-700 group-hover:text-blue-500 pr-4"></i>
            </div>

            <div class="forum-card p-6 rounded-3xl flex items-center justify-between group">
                <div class="flex items-center gap-6">
                    <div class="w-14 h-14 bg-emerald-500/10 text-emerald-500 rounded-2xl flex items-center justify-center text-2xl border border-emerald-500/20">
                        <i class="fa-solid fa-circle-question"></i>
                    </div>
                    <div>
                        <h3 id="cat-3-t" class="font-os font-bold text-xl group-hover:text-blue-400">Sual-Cavab</h3>
                        <p id="cat-3-d" class="text-gray-400 text-sm mt-1">Texniki çətinliklər və mühəndislik sualları.</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-700 group-hover:text-blue-500 pr-4"></i>
            </div>
        </div>
    </main>

    <script>
        const forumLang = {
            az: {
                back: "ANA SƏHİFƏ",
                title: "İCMA <span class='text-blue-600'>PANELİ</span>",
                subtitle: "Müzakirələr, Layihələr və İdeyalar",
                c1t: "İdeya Bankı", c1d: "Yeni startap və texnoloji ideyaların müzakirəsi.",
                c2t: "Aktiv Layihələr", c2d: "OrikOS üzərində qurulan yeni tətbiqlər.",
                c3t: "Sual-Cavab", c3d: "Texniki çətinliklər və mühəndislik sualları."
            },
            de: {
                back: "STARTSEITE",
                title: "COMMUNITY <span class='text-blue-600'>PANEL</span>",
                subtitle: "Diskussionen, Projekte und Ideen",
                c1t: "Ideen-Bank", c1d: "Diskussion über neue Startups und Technik-Ideen.",
                c2t: "Aktive Projekte", c2d: "Neue Anwendungen basierend auf OrikOS.",
                c3t: "Fragen & Antworten", c3d: "Technische Probleme und Ingenieursfragen."
            }
        };

        function setLang(lang) {
            document.getElementById('txt-nav-back').innerText = forumLang[lang].back;
            document.getElementById('txt-forum-title').innerHTML = forumLang[lang].title;
            document.getElementById('txt-forum-subtitle').innerText = forumLang[lang].subtitle;
            document.getElementById('cat-1-t').innerText = forumLang[lang].c1t;
            document.getElementById('cat-1-d').innerText = forumLang[lang].c1d;
            document.getElementById('cat-2-t').innerText = forumLang[lang].c2t;
            document.getElementById('cat-2-d').innerText = forumLang[lang].c2d;
            document.getElementById('cat-3-t').innerText = forumLang[lang].c3t;
            document.getElementById('cat-3-d').innerText = forumLang[lang].c3d;

            document.getElementById('f-az').classList.toggle('lang-active', lang === 'az');
            document.getElementById('f-de').classList.toggle('lang-active', lang === 'de');
        }
    </script>
</body>
</html>
