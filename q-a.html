<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A Hub | OrikLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; }
        .font-os { font-family: 'Orbitron', sans-serif; }
        .qa-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; }
        .glass-modal { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">

    <nav class="border-b border-white/5 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="forum.html" class="text-blue-500 font-os font-bold flex items-center gap-2">
                <i class="fa-solid fa-chevron-left text-sm"></i> <span id="nav-back">FORUM</span>
            </a>
            <button onclick="toggleModal()" class="bg-blue-600 hover:bg-blue-500 text-[10px] font-bold px-5 py-2 rounded-full uppercase tracking-tighter transition">
                <i class="fa-solid fa-plus mr-1"></i> <span id="btn-ask">Sual Ver</span>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <header class="mb-12">
            <h1 class="text-4xl font-os font-bold italic mb-4 text-white"><span id="txt-title">SUAL</span> & <span class="text-blue-600">CAVAB</span></h1>
            <p id="txt-subtitle" class="text-gray-500 text-xs uppercase tracking-[0.2em] font-bold">Müzakirə Paneli</p>
        </header>

        <div id="questions-container" class="space-y-6">
            </div>
    </main>

    <div id="ask-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-black/80">
        <div class="glass-modal w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-os font-bold text-white uppercase">Yeni Sual</h2>
                <button onclick="toggleModal()" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="qa-form" class="space-y-4">
                <input type="text" id="q-author" placeholder="Adınız və ya Anonim" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm outline-none focus:border-blue-500">
                <input type="text" id="q-title-input" placeholder="Sualın başlığı" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm outline-none focus:border-blue-500" required>
                <textarea id="q-body-input" rows="4" placeholder="Sualınızı ətraflı yazın..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm outline-none focus:border-blue-500" required></textarea>
                <button type="submit" class="w-full bg-blue-600 py-4 rounded-2xl font-bold uppercase text-[11px] tracking-widest hover:bg-blue-500 transition">Paylaş</button>
            </form>
        </div>
    </div>

    <script>
        const lang = localStorage.getItem('selectedLang') || 'az';
        const ui = {
            az: { back: "FORUM", ask: "Sual Ver", title: "SUAL", sub: "Müzakirə Paneli" },
            de: { back: "FORUM", ask: "Frage Stellen", title: "FRAGEN", sub: "Diskussionspanel" }
        };

        function toggleModal() {
            const m = document.getElementById('ask-modal');
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
        }

        // Sualları ekrana çıxaran funksiya
        function renderQuestions() {
            const container = document.getElementById('questions-container');
            const questions = JSON.parse(localStorage.getItem('oriklab_questions')) || [];
            
            container.innerHTML = ''; // Əvvəlcə təmizləyirik

            questions.reverse().forEach(q => { // Son yazılan ən üstə
                container.innerHTML += `
                    <div class="qa-card p-6 rounded-[2rem]">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[9px] bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20 font-bold uppercase tracking-widest">Mövzu</span>
                            <span class="text-[10px] text-gray-600 font-bold uppercase">${q.date}</span>
                        </div>
                        <h2 class="text-xl font-bold mb-2 text-white">${q.title}</h2>
                        <p class="text-gray-400 text-sm mb-6">${q.body}</p>
                        <div class="flex items-center justify-between border-t border-white/5 pt-4">
                            <div class="flex items-center gap-2 text-xs text-gray-300 italic">
                                <i class="fa-solid fa-user-ninja text-blue-500"></i> ${q.author}
                            </div>
                            <button class="text-[10px] font-bold text-blue-500 uppercase tracking-widest hover:underline">Cavab Ver</button>
                        </div>
                    </div>
                `;
            });
        }

        // Formu idarə etmək
        document.getElementById('qa-form').onsubmit = function(e) {
            e.preventDefault();
            
            const newQuestion = {
                author: document.getElementById('q-author').value || "Anonim",
                title: document.getElementById('q-title-input').value,
                body: document.getElementById('q-body-input').value,
                date: new Date().toLocaleDateString(),
            };

            const questions = JSON.parse(localStorage.getItem('oriklab_questions')) || [];
            questions.push(newQuestion);
            localStorage.setItem('oriklab_questions', JSON.stringify(questions));

            toggleModal();
            this.reset();
            renderQuestions(); // Dərhal yenilə
        };

        window.onload = () => {
            document.getElementById('nav-back').innerText = ui[lang].back;
            document.getElementById('btn-ask').innerText = ui[lang].ask;
            document.getElementById('txt-title').innerText = ui[lang].title;
            document.getElementById('txt-subtitle').innerText = ui[lang].sub;
            renderQuestions();
        };
    </script>
</body>
</html>
