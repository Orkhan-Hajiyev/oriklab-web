<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A Hub | OrikLab Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; overflow-x: hidden; }
        .font-os { font-family: 'Orbitron', sans-serif; }
        .hero-gradient { background: radial-gradient(circle at center, rgba(59, 130, 246, 0.1) 0%, transparent 70%); }
        .topic-card { 
            background: rgba(15, 23, 42, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .topic-card:hover { border-color: #3b82f6; transform: translateY(-5px); background: rgba(30, 41, 59, 0.5); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="border-b border-white/5 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="forum.html" class="text-blue-500 font-os font-bold flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> <span id="nav-back">FORUM</span>
            </a>
            <div class="flex items-center gap-4">
                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.3em]">OrikLab Q&A</span>
            </div>
        </div>
    </nav>

    <section class="hero-gradient py-20 px-6 text-center">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-5xl font-os font-bold mb-6 italic tracking-tighter">
                <span id="hero-t1">BİR</span> <span class="text-blue-500" id="hero-t2">SUALIN</span> <span id="hero-t3">VAR?</span>
            </h1>
            <p id="hero-desc" class="text-gray-400 mb-10 text-lg italic">İcmamızın mühəndisləri sənə kömək etməyə hazırdır.</p>
            <button onclick="toggleModal()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-10 py-5 rounded-2xl uppercase text-xs tracking-[0.2em] transition-all shadow-xl shadow-blue-600/20">
                <span id="btn-ask-text">Yeni Mövzu Aç</span>
            </button>
        </div>
    </section>

    <main class="max-w-6xl mx-auto px-6 pb-24">
        <div class="flex items-center justify-between mb-10 border-b border-white/5 pb-4">
            <h2 class="text-xl font-os font-bold tracking-widest"><i class="fa-solid fa-layer-group text-blue-500 mr-2"></i> <span id="active-title">AKTİV MÖVZULAR</span></h2>
        </div>
        <div id="topics-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="ask-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div class="bg-[#0f172a] border border-white/10 w-full max-w-xl rounded-[3rem] p-10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 id="modal-title" class="text-2xl font-os font-bold italic text-white uppercase">Yeni Paylaşım</h2>
                <button onclick="toggleModal()" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="qa-form" class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="q-author" placeholder="Adınız / Name" class="bg-white/5 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-blue-500 text-white">
                    <select id="q-category" class="bg-white/5 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-blue-500 text-gray-400">
                        <option value="General" id="opt-gen">Ümumi / Allgemein</option>
                        <option value="Tech" id="opt-tech">Texniki / Technik</option>
                    </select>
                </div>
                <input type="text" id="q-title" placeholder="Başlıq / Titel" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-blue-500 text-white" required>
                <textarea id="q-body" rows="4" placeholder="Mesaj / Nachricht" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-blue-500 text-white" required></textarea>
                <button type="submit" id="btn-submit" class="w-full bg-blue-600 py-5 rounded-2xl font-bold uppercase text-[11px] tracking-[0.3em] hover:bg-blue-500 transition">PAYLAŞ</button>
            </form>
        </div>
    </div>

    <script>
        const translations = {
            az: {
                back: "FORUM", h1: "BİR", h2: "SUALIN", h3: "VAR?", hDesc: "İcmamızın mühəndisləri sənə kömək etməyə hazırdır.",
                btnAsk: "Yeni Mövzu Aç", active: "AKTİV MÖVZULAR", modalT: "YENİ PAYLAŞIM", btnSub: "PAYLAŞ",
                catGen: "Ümumi", catTech: "Texniki", enter: "Daxil Ol", anon: "Anonim"
            },
            de: {
                back: "FORUM", h1: "HAST DU", h2: "EINE", h3: "FRAGE?", hDesc: "Unsere Ingenieure sind bereit, dir zu helfen.",
                btnAsk: "Neues Thema", active: "AKTIVE THEMEN", modalT: "NEUER BEITRAG", btnSub: "POSTEN",
                catGen: "Allgemein", catTech: "Technik", enter: "Eintreten", anon: "Anonym"
            }
        };

        const currentLang = localStorage.getItem('selectedLang') || 'az';

        function applyLanguage() {
            const t = translations[currentLang];
            document.getElementById('nav-back').innerText = t.back;
            document.getElementById('hero-t1').innerText = t.h1;
            document.getElementById('hero-t2').innerText = t.h2;
            document.getElementById('hero-t3').innerText = t.h3;
            document.getElementById('hero-desc').innerText = t.hDesc;
            document.getElementById('btn-ask-text').innerText = t.btnAsk;
            document.getElementById('active-title').innerText = t.active;
            document.getElementById('modal-title').innerText = t.modalT;
            document.getElementById('btn-submit').innerText = t.btnSub;
            document.getElementById('opt-gen').innerText = currentLang === 'az' ? "Ümumi" : "Allgemein";
            document.getElementById('opt-tech').innerText = currentLang === 'az' ? "Texniki" : "Technik";
        }

        function toggleModal() {
            const m = document.getElementById('ask-modal');
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
        }

        function renderTopics() {
            const grid = document.getElementById('topics-grid');
            const topics = JSON.parse(localStorage.getItem('oriklab_topics')) || [];
            const t = translations[currentLang];
            
            grid.innerHTML = '';
            topics.reverse().forEach(topic => {
                let displayCat = topic.category === "Tech" ? t.catTech : t.catGen;
                
                grid.innerHTML += `
                <div onclick="window.location.href='topic-details.html?id=${topic.id}'" class="topic-card p-8 rounded-[2.5rem] group">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-12 h-12 bg-blue-500/10 text-blue-500 rounded-xl flex items-center justify-center text-xl transition-colors group-hover:bg-blue-500 group-hover:text-white">
                            <i class="fa-solid fa-comments"></i>
                        </div>
                        <span class="text-[8px] font-bold border border-white/10 px-2 py-1 rounded uppercase text-gray-500 tracking-widest">${displayCat}</span>
                    </div>
                    <h3 class="text-xl font-bold mb-3 group-hover:text-blue-400 transition">${topic.title}</h3>
                    <p class="text-gray-500 text-sm mb-6 line-clamp-2">${topic.body}</p>
                    <div class="flex items-center justify-between pt-4 border-t border-white/5">
                        <span class="text-[10px] text-gray-400 font-semibold italic">@${topic.author}</span>
                        <button class="text-blue-500 text-[10px] font-bold uppercase tracking-widest hover:underline">${t.enter}</button>
                    </div>
                </div>`;
            });
        }

        document.getElementById('qa-form').onsubmit = function(e) {
            e.preventDefault();
            const topics = JSON.parse(localStorage.getItem('oriklab_topics')) || [];
            
            const newTopic = {
                id: Date.now(), // Hər mövzuya unikal ID veririk
                author: document.getElementById('q-author').value || translations[currentLang].anon,
                category: document.getElementById('q-category').value,
                title: document.getElementById('q-title').value,
                body: document.getElementById('q-body').value,
                date: new Date().toLocaleDateString(),
            };

            topics.push(newTopic);
            localStorage.setItem('oriklab_topics', JSON.stringify(topics));
            
            toggleModal();
            this.reset();
            renderTopics();
        };

        window.onload = () => {
            applyLanguage();
            renderTopics();
        };
    </script>
</body>
</html>
