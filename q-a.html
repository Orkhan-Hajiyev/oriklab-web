<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A Hub | OrikLab Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; }
        .font-os { font-family: 'Orbitron', sans-serif; }
        .qa-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; }
        .qa-card:hover { border-color: #3b82f6; }
        .glass-modal { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        select option { background: #0f172a; color: white; }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">

    <nav class="border-b border-white/5 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="forum.html" class="text-blue-500 font-os font-bold flex items-center gap-2 hover:text-blue-400">
                <i class="fa-solid fa-chevron-left text-sm"></i> <span id="nav-back">FORUM</span>
            </a>
            <div class="flex gap-4">
                <button onclick="toggleModal('ask-modal')" class="bg-blue-600 hover:bg-blue-500 text-[10px] font-bold px-5 py-2 rounded-full uppercase tracking-tighter shadow-lg shadow-blue-500/20 transition">
                    <i class="fa-solid fa-plus mr-1"></i> <span id="btn-ask">Sual Ver</span>
                </button>
                <button onclick="showAdmin()" class="text-gray-700 hover:text-blue-500 transition"><i class="fa-solid fa-shield-halved"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <header class="mb-12">
            <h1 class="text-4xl font-os font-bold italic mb-4 text-white"><span id="txt-title">SUAL</span> & <span class="text-blue-600">CAVAB</span></h1>
            <p id="txt-subtitle" class="text-gray-500 text-xs uppercase tracking-[0.2em] font-bold">Ekspertlər və mühəndislər üçün müzakirə paneli</p>
        </header>

        <div id="active-questions" class="space-y-6">
            <div class="qa-card p-6 rounded-[2rem]">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-[9px] bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20 font-bold uppercase tracking-widest">Sistem</span>
                    <span class="text-[10px] text-gray-600 font-bold uppercase">25 Mart 2026</span>
                </div>
                <h2 class="text-xl font-bold mb-3 hover:text-blue-400 cursor-pointer transition">OrikLab ekosisteminə xoş gəlmisiniz!</h2>
                <p class="text-gray-400 text-sm mb-6">Burada texniki suallarınızı verə bilərsiniz. Bütün yazılar admin yoxlamasından keçdikdən sonra dərc olunur.</p>
                <div class="flex items-center justify-between border-t border-white/5 pt-4">
                    <div class="flex items-center gap-2">
                        <div class="w-6 h-6 rounded-full bg-blue-600 flex items-center justify-center text-[10px] font-bold">O</div>
                        <span class="text-xs text-gray-300 font-semibold italic">Admin_Orkhan</span>
                    </div>
                    <button class="text-[10px] font-bold text-blue-500 uppercase tracking-widest hover:underline">Cavab Yaz</button>
                </div>
            </div>
        </div>
    </main>

    <div id="ask-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden items-center justify-center p-6">
        <div class="glass-modal w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-os font-bold italic text-white uppercase tracking-tighter">Yeni <span class="text-blue-500">Mövzu</span></h2>
                <button onclick="toggleModal('ask-modal')" class="text-gray-500 hover:text-white transition"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <form id="qa-form" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[9px] uppercase tracking-widest font-bold text-gray-500 mb-2">Görünüş</label>
                        <select id="user-type" onchange="toggleNameInput()" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm focus:border-blue-500 outline-none text-white">
                            <option value="named">İstifadəçi adı</option>
                            <option value="anon">Anonim</option>
                        </select>
                    </div>
                    <div id="name-container">
                        <label class="block text-[9px] uppercase tracking-widest font-bold text-gray-500 mb-2">Adınız</label>
                        <input type="text" id="user-name" placeholder="Məs: Orkhan" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm focus:border-blue-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-[9px] uppercase tracking-widest font-bold text-gray-500 mb-2">Başlıq</label>
                    <input type="text" id="q-title" placeholder="Sualın qısa adı" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm focus:border-blue-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-[9px] uppercase tracking-widest font-bold text-gray-500 mb-2">Məzmun</label>
                    <textarea id="q-body" rows="4" placeholder="Problemi ətraflı izah edin..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm focus:border-blue-500 outline-none" required></textarea>
                </div>
                
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold uppercase text-[11px] tracking-[0.2em] transition shadow-lg shadow-blue-600/20">
                    Moderasiyaya Göndər
                </button>
            </form>
        </div>
    </div>

    <script>
        // Dil yaddaşını yoxla
        const lang = localStorage.getItem('selectedLang') || 'az';
        const ui = {
            az: { back: "FORUM", ask: "Sual Ver", title: "SUAL", sub: "Ekspertlər üçün müzakirə paneli" },
            de: { back: "FORUM", ask: "Frage Stellen", title: "FRAGEN", sub: "Diskussionspanel für Experten" }
        };

        function initUI() {
            document.getElementById('nav-back').innerText = ui[lang].back;
            document.getElementById('btn-ask').innerText = ui[lang].ask;
            document.getElementById('txt-title').innerText = ui[lang].title;
            document.getElementById('txt-subtitle').innerText = ui[lang].sub;
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
        }

        function toggleNameInput() {
            const type = document.getElementById('user-type').value;
            document.getElementById('name-container').style.opacity = type === 'anon' ? '0.3' : '1';
            document.getElementById('user-name').disabled = type === 'anon';
        }

        // Sualı yaddaşa (Gözləməyə) göndər
        document.getElementById('qa-form').onsubmit = function(e) {
            e.preventDefault();
            const newQ = {
                id: Date.now(),
                user: document.getElementById('user-type').value === 'anon' ? 'Anonim' : document.getElementById('user-name').value,
                title: document.getElementById('q-title').value,
                body: document.getElementById('q-body').value,
                date: new Date().toLocaleDateString(),
                status: 'pending'
            };
            
            let pending = JSON.parse(localStorage.getItem('pendingQuestions')) || [];
            pending.push(newQ);
            localStorage.setItem('pendingQuestions', JSON.stringify(pending));
            
            alert("Təşəkkürlər! Sualınız yoxlanıldıqdan sonra aktiv olacaq.");
            toggleModal('ask-modal');
            this.reset();
        };

        // ADMIN FUNKSİYASI (Sənin üçün)
        function showAdmin() {
            const pass = prompt("Admin Panel Şifrəsi:");
            if(pass === "oriklab2026") {
                let pending = JSON.parse(localStorage.getItem('pendingQuestions')) || [];
                if(pending.length === 0) return alert("Gözləyən sual yoxdur.");

                pending.forEach((q, index) => {
                    let action = confirm(`Sual: ${q.title}\nKimdən: ${q.user}\n\nTəsdiq edilsin? (Ləğv üçün 'Cancel' vurun)`);
                    if(action) {
                        // Aktiv suallara əlavə et
                        let active = JSON.parse(localStorage.getItem('activeQuestions')) || [];
                        q.status = 'approved';
                        active.push(q);
                        localStorage.setItem('activeQuestions', JSON.stringify(active));
                        alert("Sual dərc olundu!");
                    }
                });
                // Təmizlə
                localStorage.setItem('pendingQuestions', JSON.stringify([]));
                location.reload();
            } else {
                alert("Giriş qadağandır!");
            }
        }

        // Aktiv sualları ekrana çıxar
        function loadQuestions() {
            const active = JSON.parse(localStorage.getItem('activeQuestions')) || [];
            const container = document.getElementById('active-questions');
            
            active.forEach(q => {
                const html = `
                    <div class="qa-card p-6 rounded-[2rem]">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[9px] bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full border border-emerald-500/20 font-bold uppercase tracking-widest">Aktiv</span>
                            <span class="text-[10px] text-gray-600 font-bold uppercase">${q.date}</span>
                        </div>
                        <h2 class="text-xl font-bold mb-3 hover:text-blue-400 cursor-pointer transition">${q.title}</h2>
                        <p class="text-gray-400 text-sm mb-6">${q.body}</p>
                        <div class="flex items-center justify-between border-t border-white/5 pt-4">
                            <div class="flex items-center gap-2">
                                <div class="w-6 h-6 rounded-full bg-gray-700 flex items-center justify-center text-[10px] font-bold">${q.user[0]}</div>
                                <span class="text-xs text-gray-300 font-semibold italic">${q.user}</span>
                            </div>
                            <button class="text-[10px] font-bold text-blue-500 uppercase tracking-widest hover:underline">Cavab Yaz</button>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        window.onload = () => {
            initUI();
            loadQuestions();
        };
    </script>
</body>
</html>
