        function switchLang(lang) {
            localStorage.setItem('selectedLang', lang);
            const t = translations[lang];
            if(!t) return;
            document.getElementById('txt-hero-desc').innerText = t.heroD;
            document.getElementById('txt-news-title').innerText = t.newsT;
            document.getElementById('txt-news-desc').innerText = t.newsD;
            document.getElementById('btn-news-text').innerText = t.newsB;
            document.getElementById('txt-com-title').innerText = t.comT;
            document.getElementById('txt-com-desc').innerText = t.comD;
            document.getElementById('txt-com-btn').innerText = t.comB;
            document.getElementById('txt-res-title').innerText = t.resT;
            document.getElementById('txt-res-desc').innerText = t.resD;
            document.getElementById('link-impressum').innerText = t.imp;
            document.getElementById('link-datenschutz').innerText = t.priv;
            document.getElementById('footer-project-info').innerText = t.projInfo;

            document.querySelectorAll('img[id^="flag-"]').forEach(img => img.classList.remove('lang-active'));
            document.getElementById('flag-' + lang).classList.add('lang-active');
        }
